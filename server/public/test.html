<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socket.IO Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: min(100%, 720px);
      margin: 0 auto;
    }

    h1 {
      color: #7dd3fc;
      margin-bottom: 16px;
    }

    label,
    button,
    input {
      display: block;
      width: 100%;
    }

    input {
      margin-top: 8px;
      padding: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
    }

    button {
      margin-top: 12px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .button-row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 12px;
    }

    #log {
      margin-top: 24px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #020617;
      padding: 16px;
      min-height: 220px;
      overflow-y: auto;
    }

    .log-entry {
      color: #6ee7b7;
      margin-bottom: 8px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Socket.IO Test Page</h1>

    <label for="token">JWT Token</label>
    <input id="token" type="text" placeholder="Paste your JWT token here" autocomplete="off" />

    <button id="connectBtn">Connect</button>

    <div class="button-row">
      <button id="joinVideoBtn" disabled>Join Video Room</button>
      <button id="leaveVideoBtn" disabled>Leave Video Room</button>
    </div>

    <div id="log"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/test.js"></script>
</body>
</html>
